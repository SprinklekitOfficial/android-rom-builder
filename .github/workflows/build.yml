name: Build ROM

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (e.g. lineage_davinci)'
        required: true
      variant:
        description: 'Build variant (user, userdebug, eng)'
        default: 'userdebug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential openjdk-11-jdk git-core gnupg flex bison gperf
      
      - name: Build ROM
        run: |
          chmod +x build.sh
          ./build.sh "${{ github.event.inputs.target }}" "${{ github.event.inputs.variant }}"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-${{ github.event.inputs.target }}
          path: 'out/target/product/**/*.zip'
          retention-days: 7
